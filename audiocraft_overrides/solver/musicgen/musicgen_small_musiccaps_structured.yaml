# @package __global__

defaults:
  - /solver/musicgen/musicgen_base_32khz
  - override /conditioner: text2music_structured
  - override /dset: audio/musiccaps_structured
  - _self_

channels: 1
sample_rate: 32000

dataset:
  batch_size: 16
  num_workers: 6
  segment_duration: 10
  sample_on_duration: false
  sample_on_weight: false
  min_segment_ratio: 0.95
  min_audio_duration: 9.8
  max_audio_duration: 10.2
  train:
    num_samples: 50000
  valid:
    num_samples: 2000
  generate:
    num_samples: 8

generate:
  every: 10
  lm:
    use_sampling: true
    temp: 1.0
    top_k: 250
    top_p: 0.0

evaluate:
  every: 10

checkpoint:
  save_last: true
  save_every: 5
  keep_last: 5

optim:
  lr: 1e-4
  epochs: 40
  updates_per_epoch: 500

