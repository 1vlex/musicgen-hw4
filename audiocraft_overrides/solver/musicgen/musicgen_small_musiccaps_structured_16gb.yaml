# @package __global__

defaults:
  - /solver/musicgen/musicgen_base_32khz
  - override /conditioner: text2music_structured
  - override /dset: audio/musiccaps_structured
  - _self_

continue_from: //pretrained/facebook/musicgen-small
mp_start_method: spawn
efficient_attention_backend: torch

channels: 1
sample_rate: 32000

transformer_lm:
  custom: true
  memory_efficient: false
  checkpointing: none

dataset:
  batch_size: 4
  num_workers: 0
  segment_duration: 10
  sample_on_duration: false
  sample_on_weight: false
  min_segment_ratio: 0.95
  min_audio_duration: 9.8
  max_audio_duration: 10.2
  train:
    num_samples: 248
  valid:
    num_samples: 10
  generate:
    num_samples: 4

generate:
  every: null
  lm:
    use_sampling: true
    temp: 1.0
    top_k: 250
    top_p: 0.0

evaluate:
  every: null

checkpoint:
  save_last: true
  save_every: 5
  keep_last: 5

optim:
  lr: 5e-5
  epochs: 10
  updates_per_epoch: 62

schedule:
  cosine:
    warmup: 50

logging:
  log_tensorboard: false
  log_comet: true
  use_tqdm: true
  progress_metrics: []
  check_sync_debug: false

comet:
  project_name: ${oc.env:COMET_PROJECT_NAME,musicgen-hw4}
  workspace: ${oc.env:COMET_WORKSPACE,''}
  experiment_name: musicgen-small-musiccaps-structured
  tags:
    - musicgen
    - musiccaps
    - structured
    - small

early_stopping:
  enabled: true
  stage_name: valid
  metric_name: ce
  mode: min
  patience: 4
  min_delta: 1e-4
  min_epochs: 4
